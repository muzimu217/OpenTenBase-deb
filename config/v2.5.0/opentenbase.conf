# OpenTenBase main control configuration
# Sourced by /usr/bin/opentenbase-ctl via /etc/opentenbase/current symlink
# Note: v2.5.0 does not support forward_port

ENABLED_NODES="gtm dn1 coord"

OTB_USER="opentenbase"
OTB_GROUP="opentenbase"
OTB_HOME="/usr/lib/opentenbase/2.5.0"

# Node names (used by opentenbase-ctl for node registration)
COORD_NODENAME="coord1"
DN1_NODENAME="dn1"

# Start/stop order
START_ORDER="gtm coord dn1"
STOP_ORDER="dn1 coord gtm"

# GTM
GTM_HOST=127.0.0.1
GTM_PGDATA="/var/lib/opentenbase/2.5.0/gtm"
GTM_PORT=6666
GTM_LOG="/var/log/opentenbase/2.5.0/gtm.log"

# Coordinator
COORD_HOST=127.0.0.1
COORD_PGDATA="/var/lib/opentenbase/2.5.0/coord"
COORD_PORT=5432
COORD_POOLER_PORT=6667
COORD_LOG="/var/log/opentenbase/2.5.0/coord.log"

# Datanode
DN_HOST=127.0.0.1
DN1_PGDATA="/var/lib/opentenbase/2.5.0/dn1"
DN1_PORT=15432
DN_PORT=15432
DN1_POOLER_PORT=6668
DN_POOLER_PORT=6668
DN1_LOG="/var/log/opentenbase/2.5.0/dn1.log"
