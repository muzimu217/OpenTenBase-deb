services:
  # ============================================
  # GTM (Global Transaction Manager)
  # ============================================
  gtm:
    build:
      context: ../runtime
    container_name: opentenbase-gtm
    hostname: gtm
    environment:
      - NODE_TYPE=gtm
      - NODE_NAME=gtm
      - GTM_PORT=6666
    ports:
      - "6666:6666"
    volumes:
      - gtm_data:/var/lib/opentenbase/data/gtm
    networks:
      - opentenbase
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 6666 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ============================================
  # Coordinator
  # ============================================
  coordinator:
    build:
      context: ../runtime
    container_name: opentenbase-coordinator
    hostname: coordinator
    depends_on:
      gtm:
        condition: service_healthy
    environment:
      - NODE_TYPE=coordinator
      - NODE_NAME=coordinator
      - GTM_HOST=gtm
      - GTM_PORT=6666
      - COORD_HOST=coordinator
      - COORD_PORT=5432
    ports:
      - "5432:5432"
    volumes:
      - coord_data:/var/lib/opentenbase/data/coordinator
    networks:
      - opentenbase
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 5432 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

  # ============================================
  # Datanode 1
  # ============================================
  datanode1:
    build:
      context: ../runtime
    container_name: opentenbase-datanode1
    hostname: datanode1
    depends_on:
      gtm:
        condition: service_healthy
    environment:
      - NODE_TYPE=datanode
      - NODE_NAME=datanode1
      - GTM_HOST=gtm
      - GTM_PORT=6666
      - COORD_HOST=coordinator
      - COORD_PORT=5432
      - DN_PORT=15432
    ports:
      - "15432:15432"
    volumes:
      - dn1_data:/var/lib/opentenbase/data/datanode1
    networks:
      - opentenbase
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 15432 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

  # ============================================
  # Datanode 2
  # ============================================
  datanode2:
    build:
      context: ../runtime
    container_name: opentenbase-datanode2
    hostname: datanode2
    depends_on:
      gtm:
        condition: service_healthy
    environment:
      - NODE_TYPE=datanode
      - NODE_NAME=datanode2
      - GTM_HOST=gtm
      - GTM_PORT=6666
      - COORD_HOST=coordinator
      - COORD_PORT=5432
      - DN_PORT=15433
    ports:
      - "15433:15433"
    volumes:
      - dn2_data:/var/lib/opentenbase/data/datanode2
    networks:
      - opentenbase
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 15433 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  gtm_data:
  coord_data:
  dn1_data:
  dn2_data:

networks:
  opentenbase:
    driver: bridge
