name: Build .deb packages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-${{ matrix.ubuntu }}
    continue-on-error: ${{ matrix.optional || false }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - ubuntu: "20.04"
            codename: focal
            libpqxx: libpqxx-6.4
            cli11_from_source: true
            debhelper_compat: 12
            optional: true
          - ubuntu: "22.04"
            codename: jammy
            libpqxx: libpqxx-7.6
            cli11_from_source: false
            debhelper_compat: 13
          - ubuntu: "24.04"
            codename: noble
            libpqxx: libpqxx-7.8t64
            cli11_from_source: false
            debhelper_compat: 13

    steps:
      - name: Clone OpenTenBase source
        run: |
          git clone --depth=1 https://github.com/OpenTenBase/OpenTenBase.git source

      - name: Checkout packaging files
        uses: actions/checkout@v4
        with:
          path: packaging

      - name: Merge packaging into source
        run: |
          mkdir -p source/debian
          for f in packaging/*; do
            name=$(basename "$f")
            case "$name" in
              .github|README.md|VERIFICATION.md) continue ;;
            esac
            cp -a "$f" source/debian/
          done

      - name: Apply patches manually
        working-directory: source
        run: |
          # Apply bool/stdbool patch (prevents _Bool vs char conflicts)
          if [ -f debian/patches/01-bool-stdbool.patch ]; then
            patch -p1 < debian/patches/01-bool-stdbool.patch || true
          fi
          # Apply nolic sharding patch
          if [ -f debian/patches/02-nolic-sharding.patch ]; then
            patch -p1 < debian/patches/02-nolic-sharding.patch || true
          fi

      - name: Install CLI11 from source (focal only)
        if: matrix.cli11_from_source
        run: |
          git clone --depth=1 https://github.com/CLIUtils/CLI11.git /tmp/cli11
          sudo cp -r /tmp/cli11/include/CLI /usr/include/

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            bison flex perl gcc g++ make \
            libreadline-dev zlib1g-dev libssl-dev libpam0g-dev \
            libxml2-dev libldap2-dev libossp-uuid-dev uuid-dev \
            libcurl4-openssl-dev liblz4-dev libzstd-dev \
            libssh2-1-dev \
            libpqxx-dev quilt libtool pkg-config
          sudo apt-get install -y -qq debhelper
          sudo apt-get install -y -qq libcli11-dev 2>/dev/null || true

      - name: Fix library paths
        run: |
          sudo mkdir -p /usr/local/lib
          ZSTD_LIB=$(find /usr/lib -name 'libzstd.so' -o -name 'libzstd.a' 2>/dev/null | head -1)
          if [ -n "$ZSTD_LIB" ]; then
            sudo ln -sf "$ZSTD_LIB" /usr/local/lib/libzstd.so
            sudo ln -sf "$ZSTD_LIB" /usr/local/lib/libzstd.a 2>/dev/null || true
          fi
          LZ4_LIB=$(find /usr/lib -name 'liblz4.so' -o -name 'liblz4.a' 2>/dev/null | head -1)
          if [ -n "$LZ4_LIB" ]; then
            sudo ln -sf "$LZ4_LIB" /usr/local/lib/liblz4.so
            sudo ln -sf "$LZ4_LIB" /usr/local/lib/liblz4.a 2>/dev/null || true
          fi

      - name: Patch control for ${{ matrix.codename }}
        working-directory: source
        run: |
          sed -i "s/libpqxx-7.8t64 (>= 7.2)/${{ matrix.libpqxx }} (>= 7.2)/" debian/control
          sed -i "s/debhelper-compat (= 13)/debhelper-compat (= ${{ matrix.debhelper_compat }})/" debian/control
          sed -i "s/5.0-1ubuntu1/5.0-1ubuntu1~${{ matrix.codename }}/" debian/changelog

      - name: Build packages
        working-directory: source
        run: |
          fakeroot debian/rules binary 2>&1 | tee ../build.log
          mkdir -p ../output
          mv ../*.deb ../output/

      - name: Verify packages
        run: |
          for deb in output/*.deb; do
            echo "=== $(basename $deb) ==="
            dpkg-deb -I "$deb" | head -15
            echo
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: debs-${{ matrix.codename }}
          path: output/*.deb
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-debs

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            all-debs/**/*.deb
            install.sh
