name: Build .deb packages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-${{ matrix.ubuntu }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - ubuntu: "20.04"
            codename: focal
            libpqxx: libpqxx-6.4
          - ubuntu: "22.04"
            codename: jammy
            libpqxx: libpqxx-7.6
          - ubuntu: "24.04"
            codename: noble
            libpqxx: libpqxx-7.8t64

    steps:
      - name: Clone OpenTenBase source
        run: |
          git clone --depth=1 https://github.com/OpenTenBase/OpenTenBase.git source

      - name: Checkout packaging files
        uses: actions/checkout@v4
        with:
          path: packaging

      - name: Merge packaging into source
        run: |
          # Packaging repo has debian files at root, move into source/debian/
          mkdir -p source/debian
          # Copy all packaging files except .github, README, VERIFICATION
          for f in packaging/*; do
            name=$(basename "$f")
            case "$name" in
              .github|README.md|VERIFICATION.md) continue ;;
            esac
            cp -a "$f" source/debian/
          done
          # Copy install.sh to output later
          cp packaging/install.sh source/ 2>/dev/null || true

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            debhelper-compat bison flex perl gcc g++ make \
            libreadline-dev zlib1g-dev libssl-dev libpam0g-dev \
            libxml2-dev libldap2-dev libossp-uuid-dev uuid-dev \
            libcurl4-openssl-dev liblz4-dev libzstd-dev \
            libcli11-dev libpqxx-dev quilt libtool pkg-config

      - name: Patch control for ${{ matrix.codename }}
        working-directory: source
        run: |
          sed -i "s/libpqxx-7.8t64 (>= 7.2)/${{ matrix.libpqxx }} (>= 7.2)/" debian/control
          sed -i "s/5.0-1ubuntu1/5.0-1ubuntu1~${{ matrix.codename }}/" debian/changelog

      - name: Build packages
        working-directory: source
        run: |
          fakeroot debian/rules binary 2>&1 | tee ../build.log
          mkdir -p ../output
          mv ../*.deb ../output/

      - name: Verify packages
        run: |
          for deb in output/*.deb; do
            echo "=== $(basename $deb) ==="
            dpkg-deb -I "$deb" | head -15
            echo
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: debs-${{ matrix.codename }}
          path: output/*.deb
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-debs

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            all-debs/**/*.deb
            install.sh
