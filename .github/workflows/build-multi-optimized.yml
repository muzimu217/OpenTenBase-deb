name: Build Multi-Distro Packages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      distro:
        description: 'Specific distro to build (leave empty for all)'
        required: false
        default: ''
      version:
        description: 'Specific version to build (leave empty for all)'
        required: false
        default: ''

env:
  DOCKER_BUILDKIT: 1
  BUILDKIT_PROGRESS: plain

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set matrix
        id: set-matrix
        run: |
          if [ -n "${{ github.event.inputs.distro }}" ] && [ -n "${{ github.event.inputs.version }}" ]; then
            # Build specific distro
            MATRIX=$(cat << 'MATRIX_EOF'
          {
            "include": [
              {
                "distro": "${{ github.event.inputs.distro }}",
                "version": "${{ github.event.inputs.version }}",
                "codename": "${{ github.event.inputs.version }}",
                "dockerfile": "docker/build/docker-${{ github.event.inputs.distro }}-${{ github.event.inputs.version }}.Dockerfile"
              }
            ]
          }
          MATRIX_EOF
            )
          else
            # Build all distros
            MATRIX=$(cat << 'MATRIX_EOF'
          {
            "include": [
              {
                "distro": "ubuntu",
                "version": "20.04",
                "codename": "focal",
                "dockerfile": "docker/build/docker-ubuntu-20.04.Dockerfile"
              },
              {
                "distro": "ubuntu",
                "version": "22.04",
                "codename": "jammy",
                "dockerfile": "docker/build/docker-ubuntu-20.04.Dockerfile"
              },
              {
                "distro": "ubuntu",
                "version": "24.04",
                "codename": "noble",
                "dockerfile": "docker/build/docker-ubuntu-20.04.Dockerfile"
              },
              {
                "distro": "debian",
                "version": "11",
                "codename": "bullseye",
                "dockerfile": "docker/build/docker-debian-11.Dockerfile"
              },
              {
                "distro": "debian",
                "version": "12",
                "codename": "bookworm",
                "dockerfile": "docker/build/docker-debian-12.Dockerfile"
              }
            ]
          }
          MATRIX_EOF
            )
          fi
          
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT

  build:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone OpenTenBase source
        run: |
          git clone --depth=1 https://github.com/OpenTenBase/OpenTenBase.git source

      - name: Checkout packaging files
        uses: actions/checkout@v4
        with:
          path: packaging

      - name: Merge packaging into source
        run: |
          mkdir -p source/debian
          for f in packaging/*; do
            name=$(basename "$f")
            case "$name" in
              .github|docker|scripts|docs|test|systemd|*.md) continue ;;
            esac
            cp -a "$f" source/debian/
          done

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ matrix.distro }}-${{ matrix.version }}-${{ hashFiles(format('docker/build/docker-{0}-{1}.Dockerfile', matrix.distro, matrix.version)) }}
          restore-keys: |
            ${{ runner.os }}-buildx-${{ matrix.distro }}-${{ matrix.version }}-

      - name: Build Docker image
        run: |
          docker build \
            --file ${{ matrix.dockerfile }} \
            --tag opentenbase-builder:${{ matrix.distro }}-${{ matrix.version }} \
            --cache-from type=local,src=/tmp/.buildx-cache \
            --cache-to type=local,dest=/tmp/.buildx-cache-new,mode=max \
            .

      - name: Build packages
        run: |
          docker run \
            --rm \
            --volume $(pwd)/source:/source \
            --volume $(pwd)/output:/output \
            opentenbase-builder:${{ matrix.distro }}-${{ matrix.version }}

      - name: Verify packages
        run: |
          echo "=== 构建产物验证 ==="
          echo "发行版: ${{ matrix.distro }} ${{ matrix.version }} (${{ matrix.codename }})"
          echo ""
          
          if [ -z "$(ls -A output/*.deb 2>/dev/null)" ]; then
            echo "错误: 未生成 .deb 包"
            exit 1
          fi
          
          for deb in output/*.deb; do
            echo "--- $(basename $deb) ---"
            dpkg-deb -I "$deb" | head -15
            echo ""
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: debs-${{ matrix.distro }}-${{ matrix.codename }}
          path: output/*.deb
          retention-days: 30

      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-debs

      - name: List all packages
        run: |
          echo "=== 所有构建产物 ==="
          find all-debs -name "*.deb" -type f | sort | while read deb; do
            echo "$(basename $deb)"
          done

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            all-debs/**/*.deb
            scripts/install.sh
          body: |
            ## OpenTenBase v${{ github.ref_name }} Release
            
            ### 支持的发行版
            - Ubuntu 20.04 (Focal)
            - Ubuntu 22.04 (Jammy)
            - Ubuntu 24.04 (Noble)
            - Debian 11 (Bullseye)
            - Debian 12 (Bookworm)
            
            ### 安装方法
            
            #### 一键安装（推荐）
            ```bash
            curl -sLO https://github.com/muzimu217/opentenbase-deb/releases/download/${{ github.ref_name }}/install.sh
            sudo bash install.sh
            ```
            
            #### 手动安装
            请参考 [README.md](README.md) 或 [README_zh.md](README_zh.md)
            
            ### 文档
            - [English Documentation](README.md)
            - [中文文档](README_zh.md)
            - [Roadmap](ROADMAP.md)
            - [Contributing Guide](CONTRIBUTING.md)
