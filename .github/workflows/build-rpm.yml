name: Build RPM Packages

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'OpenTenBase version (e.g., 5.0, 6.0)'
        required: true
        default: '5.0'
        type: string
  workflow_call:
    inputs:
      version:
        description: 'OpenTenBase version (e.g., 5.0, 6.0)'
        required: false
        default: '5.0'
        type: string

jobs:
  build-rpm-x86_64:
    if: ${{ !inputs.arch_only || inputs.arch_only == 'x86_64' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: centos-stream-8-x86_64
            container: quay.io/centos/centos:stream8
          - name: centos-stream-9-x86_64
            container: quay.io/centos/centos:stream9
          - name: rockylinux-8-x86_64
            container: rockylinux:8
          - name: rockylinux-9-x86_64
            container: rockylinux:9
          - name: almalinux-8-x86_64
            container: almalinux:8
          - name: almalinux-9-x86_64
            container: almalinux:9
          - name: fedora-40-x86_64
            container: quay.io/fedora/fedora:40
          - name: openeuler-22.03-x86_64
            container: openeuler/openeuler:22.03

    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    continue-on-error: ${{ contains(matrix.name, 'openeuler') }}
    container:
      image: ${{ matrix.container }}

    steps:
      - name: Enable additional repos and install deps
        run: |
          if [ -f /etc/openEuler-release ] || grep -qi openeuler /etc/os-release 2>/dev/null; then
            sed -i 's|repo.openeuler.org|mirrors.aliyun.com/openeuler|g' /etc/yum.repos.d/*.repo 2>/dev/null || true
          fi
          if grep -q 'CentOS Stream release 8' /etc/redhat-release 2>/dev/null; then
            sed -i 's|mirrorlist=|#mirrorlist=|g' /etc/yum.repos.d/CentOS-Stream-*.repo
            sed -i 's|#baseurl=http://mirror.centos.org|baseurl=http://vault.centos.org|g' /etc/yum.repos.d/CentOS-Stream-*.repo
          fi
          dnf install -y dnf-plugins-core 2>/dev/null || true
          for repo in crb powertools; do
            dnf config-manager --set-enabled "$repo" 2>/dev/null || true
          done
          if [ -f /etc/rocky-release ] || [ -f /etc/almalinux-release ]; then
            REL=$(rpm -q --queryformat '%{VERSION}' -f /etc/redhat-release 2>/dev/null | cut -d. -f1)
            if [ "$REL" = "9" ]; then
              ARCH_VAL=$(uname -m)
              if [ -f /etc/rocky-release ]; then
                CRB_URL="https://dl.rockylinux.org/pub/rocky/9/CRB/${ARCH_VAL}/os/"
              else
                CRB_URL="https://repo.almalinux.org/almalinux/9/CRB/${ARCH_VAL}/os/"
              fi
              printf "[crb]\nname=CRB\nbaseurl=${CRB_URL}\nenabled=1\ngpgcheck=0\n" > /etc/yum.repos.d/crb.repo
            fi
          fi
          dnf install -y \
            gcc gcc-c++ make bison flex perl \
            readline-devel zlib-devel openssl-devel pam-devel \
            libxml2-devel openldap-devel libuuid-devel \
            libcurl-devel lz4-devel \
            pkg-config libtool rpm-build rpmlint git
          dnf install -y zstd-devel 2>/dev/null || true
          dnf install -y libssh2-devel 2>/dev/null || true
          dnf install -y libatomic 2>/dev/null || true
          for dir in /usr/lib64 /usr/lib; do
            if [ -f "$dir/libatomic.so.1" ] && [ ! -f "$dir/libatomic.so" ]; then
              ln -s libatomic.so.1 "$dir/libatomic.so"
            fi
          done

      - name: Checkout source
        uses: actions/checkout@v4
        with:
          path: opentenbase-pkg

      - name: Clone OpenTenBase upstream source
        run: |
          if [ -d /tmp/source/OpenTenBase/.git ]; then
            cd /tmp/source/OpenTenBase && git pull --depth=1
          else
            git clone --depth=1 \
              https://github.com/OpenTenBase/OpenTenBase.git \
              /tmp/source/OpenTenBase
          fi

      - name: Build RPM packages
        run: |
          cd opentenbase-pkg/rpm
          bash build-rpm.sh --source-dir /tmp/source/OpenTenBase --version 5.0

      - name: Run rpmlint
        if: always()
        run: |
          rpmlint ~/rpmbuild/RPMS/*/*.rpm ~/rpmbuild/SRPMS/*.rpm 2>&1 || true

      - name: Rename RPM packages with distro name
        if: always()
        run: |
          ARCH_DIR=$(uname -m)
          cd ~/rpmbuild/RPMS/${ARCH_DIR} 2>/dev/null || cd ~/rpmbuild/RPMS/noarch 2>/dev/null || true
          for rpm in *.rpm; do
            [ -f "$rpm" ] || continue
            newname=$(echo "$rpm" | sed "s/-5\.0-1\./-5.0-1.${{ matrix.name }}./")
            if [ "$newname" != "$rpm" ]; then
              mv "$rpm" "$newname"
            fi
          done
          ls -la *.rpm 2>/dev/null || true

      - name: Upload RPM packages
        uses: actions/upload-artifact@v4
        with:
          name: rpms-${{ matrix.name }}
          path: ~/rpmbuild/RPMS/**/*.rpm
          retention-days: 30

      - name: Upload source RPM
        uses: actions/upload-artifact@v4
        with:
          name: srpm-${{ matrix.name }}
          path: ~/rpmbuild/SRPMS/*.rpm
          retention-days: 30

      - name: Cleanup
        if: always()
        run: |
          rm -rf /tmp/source
          dnf clean all

  build-rpm-aarch64:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: openeuler-22.03-aarch64
            container: openeuler/openeuler:22.03
          - name: rockylinux-9-aarch64
            container: rockylinux:9
          - name: almalinux-9-aarch64
            container: almalinux:9
          - name: centos-stream-9-aarch64
            container: quay.io/centos/centos:stream9

    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    continue-on-error: ${{ contains(matrix.name, 'openeuler') }}

    steps:
      - name: Set up QEMU for aarch64
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Checkout source
        uses: actions/checkout@v4
        with:
          path: opentenbase-pkg

      - name: Clone OpenTenBase upstream source
        run: |
          git clone --depth=1 \
            https://github.com/OpenTenBase/OpenTenBase.git \
            /tmp/source/OpenTenBase

      - name: Build RPM packages (aarch64 via QEMU)
        run: |
          docker run --rm --platform linux/arm64 \
            -v /tmp/source/OpenTenBase:/tmp/source/OpenTenBase:ro \
            -v ${{ github.workspace }}/opentenbase-pkg:/tmp/opentenbase-pkg:ro \
            -v ${{ github.workspace }}/output:/output \
            ${{ matrix.container }} \
            bash -c '
              set -e
              # Mirror setup
              if [ -f /etc/openEuler-release ] || grep -qi openeuler /etc/os-release 2>/dev/null; then
                sed -i "s|repo.openeuler.org|mirrors.aliyun.com/openeuler|g" /etc/yum.repos.d/*.repo 2>/dev/null || true
              fi
              if grep -q "CentOS Stream release 8" /etc/redhat-release 2>/dev/null; then
                sed -i "s|mirrorlist=|#mirrorlist=|g" /etc/yum.repos.d/CentOS-Stream-*.repo
                sed -i "s|#baseurl=http://mirror.centos.org|baseurl=http://vault.centos.org|g" /etc/yum.repos.d/CentOS-Stream-*.repo
              fi
              dnf install -y dnf-plugins-core 2>/dev/null || true
              for repo in crb powertools; do
                dnf config-manager --set-enabled "$repo" 2>/dev/null || true
              done
              if [ -f /etc/rocky-release ] || [ -f /etc/almalinux-release ]; then
                REL=$(rpm -q --queryformat "%{VERSION}" -f /etc/redhat-release 2>/dev/null | cut -d. -f1)
                if [ "$REL" = "9" ]; then
                  ARCH_VAL=$(uname -m)
                  if [ -f /etc/rocky-release ]; then
                    CRB_URL="https://dl.rockylinux.org/pub/rocky/9/CRB/${ARCH_VAL}/os/"
                  else
                    CRB_URL="https://repo.almalinux.org/almalinux/9/CRB/${ARCH_VAL}/os/"
                  fi
                  printf "[crb]\nname=CRB\nbaseurl=${CRB_URL}\nenabled=1\ngpgcheck=0\n" > /etc/yum.repos.d/crb.repo
                fi
              fi
              dnf install -y \
                gcc gcc-c++ make bison flex perl \
                readline-devel zlib-devel openssl-devel pam-devel \
                libxml2-devel openldap-devel libuuid-devel \
                libcurl-devel lz4-devel \
                pkg-config libtool rpm-build rpmlint git
              dnf install -y zstd-devel 2>/dev/null || true
              dnf install -y libssh2-devel 2>/dev/null || true
              dnf install -y libatomic 2>/dev/null || true
              for dir in /usr/lib64 /usr/lib; do
                if [ -f "$dir/libatomic.so.1" ] && [ ! -f "$dir/libatomic.so" ]; then
                  ln -s libatomic.so.1 "$dir/libatomic.so"
                fi
              done

              # Copy sources
              cp -r /tmp/source/OpenTenBase /tmp/build-source
              cp -r /tmp/opentenbase-pkg /tmp/build-pkg

              # Build
              cd /tmp/build-pkg/rpm
              bash build-rpm.sh --source-dir /tmp/build-source --version 5.0

              # Copy output
              ARCH_DIR=$(uname -m)
              cp ~/rpmbuild/RPMS/${ARCH_DIR}/*.rpm /output/ 2>/dev/null || true
              cp ~/rpmbuild/RPMS/noarch/*.rpm /output/ 2>/dev/null || true
              cp ~/rpmbuild/SRPMS/*.rpm /output/ 2>/dev/null || true
            '

      - name: Rename RPM packages with distro name
        if: always()
        run: |
          cd ${{ github.workspace }}/output 2>/dev/null || true
          for rpm in *.rpm; do
            [ -f "$rpm" ] || continue
            newname=$(echo "$rpm" | sed "s/-5\.0-1\./-5.0-1.${{ matrix.name }}./")
            if [ "$newname" != "$rpm" ]; then
              mv "$rpm" "$newname"
            fi
          done
          ls -la *.rpm 2>/dev/null || true

      - name: Upload RPM packages
        uses: actions/upload-artifact@v4
        with:
          name: rpms-${{ matrix.name }}
          path: ${{ github.workspace }}/output/*.rpm
          retention-days: 30
