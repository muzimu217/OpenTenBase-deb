name: Build RPM Packages

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      versions:
        description: 'Comma-separated versions (e.g., 5.0,2.6.0,2.5.0)'
        required: true
        default: '5.0,2.6.0,2.5.0'
        type: string
  workflow_call:
    inputs:
      versions:
        description: 'Comma-separated versions'
        required: false
        default: '5.0,2.6.0,2.5.0'
        type: string

jobs:
  setup-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        env:
          INPUT_VERSIONS: ${{ inputs.versions }}
        run: |
          VERSIONS="${INPUT_VERSIONS:-5.0,2.6.0,2.5.0}"
          MATRIX='{"include":['
          FIRST=true
          for ver in $(echo "$VERSIONS" | tr ',' ' '); do
            for entry in \
              "centos-stream-8:quay.io/centos/centos:stream8" \
              "centos-stream-9:quay.io/centos/centos:stream9" \
              "rockylinux-8:rockylinux:8" \
              "rockylinux-9:rockylinux:9" \
              "almalinux-8:almalinux:8" \
              "almalinux-9:almalinux:9" \
              "fedora-40:quay.io/fedora/fedora:40" \
              "openeuler-22.03:openeuler/openeuler:22.03"; do
              IFS=':' read -r distro container <<< "$entry"
              if [ "$FIRST" = "true" ]; then
                FIRST=false
              else
                MATRIX="$MATRIX,"
              fi
              MATRIX="$MATRIX{\"version\":\"$ver\",\"name\":\"${distro}-${ver}-x86_64\",\"container\":\"$container\"}"
            done
          done
          MATRIX="$MATRIX]}"
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

  build-rpm-x86_64:
    needs: setup-matrix
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix: ${{ fromJSON(needs.setup-matrix.outputs.matrix) }}

    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    continue-on-error: ${{ contains(matrix.name, 'openeuler') }}
    container:
      image: ${{ matrix.container }}

    steps:
      - name: Enable additional repos and install deps
        run: |
          if [ -f /etc/openEuler-release ] || grep -qi openeuler /etc/os-release 2>/dev/null; then
            sed -i 's|repo.openeuler.org|mirrors.aliyun.com/openeuler|g' /etc/yum.repos.d/*.repo 2>/dev/null || true
          fi
          if grep -q 'CentOS Stream release 8' /etc/redhat-release 2>/dev/null; then
            sed -i 's|mirrorlist=|#mirrorlist=|g' /etc/yum.repos.d/CentOS-Stream-*.repo
            sed -i 's|#baseurl=http://mirror.centos.org|baseurl=http://vault.centos.org|g' /etc/yum.repos.d/CentOS-Stream-*.repo
          fi
          dnf install -y dnf-plugins-core 2>/dev/null || true
          for repo in crb powertools; do
            dnf config-manager --set-enabled "$repo" 2>/dev/null || true
          done
          if [ -f /etc/rocky-release ] || [ -f /etc/almalinux-release ]; then
            REL=$(rpm -q --queryformat '%{VERSION}' -f /etc/redhat-release 2>/dev/null | cut -d. -f1)
            if [ "$REL" = "9" ]; then
              ARCH_VAL=$(uname -m)
              if [ -f /etc/rocky-release ]; then
                CRB_URL="https://dl.rockylinux.org/pub/rocky/9/CRB/${ARCH_VAL}/os/"
              else
                CRB_URL="https://repo.almalinux.org/almalinux/9/CRB/${ARCH_VAL}/os/"
              fi
              printf "[crb]\nname=CRB\nbaseurl=${CRB_URL}\nenabled=1\ngpgcheck=0\n" > /etc/yum.repos.d/crb.repo
            fi
          fi
          dnf install -y \
            gcc gcc-c++ make bison flex perl \
            readline-devel zlib-devel openssl-devel pam-devel \
            libxml2-devel openldap-devel libuuid-devel \
            libcurl-devel lz4-devel \
            pkg-config libtool rpm-build rpmlint git
          dnf install -y zstd-devel 2>/dev/null || true
          dnf install -y libssh2-devel 2>/dev/null || true
          dnf install -y libatomic 2>/dev/null || true
          for dir in /usr/lib64 /usr/lib; do
            if [ -f "$dir/libatomic.so.1" ] && [ ! -f "$dir/libatomic.so" ]; then
              ln -s libatomic.so.1 "$dir/libatomic.so"
            fi
          done

      - name: Checkout source
        uses: actions/checkout@v4
        with:
          path: opentenbase-pkg

      - name: Clone OpenTenBase upstream source
        run: |
          VERSION="${{ matrix.version }}"
          if [ -d /tmp/source/OpenTenBase/.git ]; then
            cd /tmp/source/OpenTenBase && git pull --depth=1
          else
            if [ "$VERSION" = "5.0" ]; then
              git clone --depth=1 \
                https://github.com/OpenTenBase/OpenTenBase.git \
                /tmp/source/OpenTenBase
            else
              git clone --depth=1 --branch "v${VERSION}" \
                https://github.com/OpenTenBase/OpenTenBase.git \
                /tmp/source/OpenTenBase 2>/dev/null || {
                echo "Tag v${VERSION} not found, trying default branch"
                git clone --depth=1 \
                  https://github.com/OpenTenBase/OpenTenBase.git \
                  /tmp/source/OpenTenBase
              }
            fi
          fi

      - name: Build RPM packages
        run: |
          cd opentenbase-pkg/rpm
          bash build-rpm.sh --source-dir /tmp/source/OpenTenBase --version ${{ matrix.version }}

      - name: Run rpmlint
        if: always()
        run: |
          rpmlint ~/rpmbuild/RPMS/*/*.rpm ~/rpmbuild/SRPMS/*.rpm 2>&1 || true

      - name: Rename RPM packages with distro name
        if: always()
        run: |
          ARCH_DIR=$(uname -m)
          VERSION="${{ matrix.version }}"
          cd ~/rpmbuild/RPMS/${ARCH_DIR} 2>/dev/null || cd ~/rpmbuild/RPMS/noarch 2>/dev/null || true
          for rpm in *.rpm; do
            [ -f "$rpm" ] || continue
            newname=$(echo "$rpm" | sed "s/-${VERSION}-1\./-${VERSION}-1.${{ matrix.name }}./")
            if [ "$newname" != "$rpm" ]; then
              mv "$rpm" "$newname"
            fi
          done
          ls -la *.rpm 2>/dev/null || true

      - name: Upload RPM packages
        uses: actions/upload-artifact@v4
        with:
          name: rpms-${{ matrix.name }}
          path: ~/rpmbuild/RPMS/**/*.rpm
          retention-days: 30

      - name: Upload source RPM
        uses: actions/upload-artifact@v4
        with:
          name: srpm-${{ matrix.name }}
          path: ~/rpmbuild/SRPMS/*.rpm
          retention-days: 30

      - name: Cleanup
        if: always()
        run: |
          rm -rf /tmp/source
          dnf clean all

  # ============================================================
  # ARM64 RPM builds using QEMU emulation
  # ============================================================
  build-rpm-aarch64:
    needs: setup-matrix
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        include:
          - version: '5.0'
            distro: 'openeuler-22.03'
            container: 'openeuler/openeuler:22.03'
          - version: '5.0'
            distro: 'rockylinux-9'
            container: 'rockylinux:9'
          - version: '5.0'
            distro: 'almalinux-9'
            container: 'almalinux:9'

    name: ${{ matrix.distro }}-${{ matrix.version }}-aarch64
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Set up QEMU for ARM64
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64

      - name: Checkout source
        uses: actions/checkout@v4
        with:
          path: opentenbase-pkg

      - name: Build ARM64 RPM in container
        run: |
          # Create output directory on host
          mkdir -p ${{ github.workspace }}/output

          docker run --rm --platform linux/arm64 \
            -v ${{ github.workspace }}/opentenbase-pkg:/pkg:ro \
            -v ${{ github.workspace }}/output:/output \
            -v /tmp/source:/tmp/source \
            -e VERSION=${{ matrix.version }} \
            ${CONTAINER} bash -c '
              # Install dependencies
              dnf install -y gcc gcc-c++ make bison flex perl \
                readline-devel zlib-devel openssl-devel pam-devel \
                libxml2-devel openldap-devel libuuid-devel \
                libcurl-devel lz4-devel zstd-devel \
                pkg-config libtool rpm-build git \
                libssh2-devel libatomic || true

              # Clone source if not already present
              if [ ! -d /tmp/source/OpenTenBase ]; then
                if [ "$VERSION" = "5.0" ]; then
                  git clone --depth=1 https://github.com/OpenTenBase/OpenTenBase.git /tmp/source/OpenTenBase
                else
                  git clone --depth=1 --branch "v${VERSION}" https://github.com/OpenTenBase/OpenTenBase.git /tmp/source/OpenTenBase
                fi
              fi

              # Build
              cd /pkg/rpm
              bash build-rpm.sh --source-dir /tmp/source/OpenTenBase --version $VERSION

              # Rename and output
              ARCH=$(uname -m)
              cd ~/rpmbuild/RPMS/${ARCH} || cd ~/rpmbuild/RPMS/noarch || true
              for rpm in *.rpm; do
                [ -f "$rpm" ] || continue
                newname=$(echo "$rpm" | sed "s/-${VERSION}-1\./-${VERSION}-1.${{ matrix.distro }}-${VERSION}-aarch64./")
                [ "$newname" != "$rpm" ] && mv "$rpm" "$newname"
              done
              ls -la *.rpm

              # Copy to mounted output directory
              cp *.rpm /output/
            '
        env:
          CONTAINER: ${{ matrix.container }}

      - name: Upload ARM64 RPM packages
        uses: actions/upload-artifact@v4
        with:
          name: rpms-${{ matrix.distro }}-${{ matrix.version }}-aarch64
          path: ${{ github.workspace }}/output/*.rpm
          retention-days: 30
