name: Build DEB Packages

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      versions:
        description: 'Comma-separated versions (e.g., 5.0,2.6.0,2.5.0)'
        required: true
        default: '5.0,2.6.0,2.5.0'
        type: string
  workflow_call:
    inputs:
      versions:
        description: 'Comma-separated versions'
        required: false
        default: '5.0,2.6.0,2.5.0'
        type: string

jobs:
  setup-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          VERSIONS='${{ inputs.versions || ''5.0,2.6.0,2.5.0'' }}'
          # Build matrix JSON: each version × each distro
          MATRIX='{"include":['
          FIRST=true
          for ver in $(echo "$VERSIONS" | tr ',' ' '); do
            for entry in \
              "ubuntu-20.04:ubuntu:20.04:focal" \
              "ubuntu-22.04:ubuntu:22.04:jammy" \
              "ubuntu-24.04:ubuntu:24.04:noble" \
              "ubuntu-25.04:ubuntu:25.04:plucky" \
              "debian-11:debian:bullseye:bullseye" \
              "debian-12:debian:bookworm:bookworm" \
              "debian-13:debian:trixie:trixie"; do
              IFS=':' read -r distro container codename_name codename <<< "$entry"
              if [ "$FIRST" = "true" ]; then
                FIRST=false
              else
                MATRIX="$MATRIX,"
              fi
              MATRIX="$MATRIX{\"version\":\"$ver\",\"name\":\"${distro}-${ver}-amd64\",\"container\":\"$container\",\"codename\":\"$codename\"}"
            done
          done
          MATRIX="$MATRIX]}"
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "Matrix: $MATRIX"

  build-deb-amd64:
    needs: setup-matrix
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix: ${{ fromJSON(needs.setup-matrix.outputs.matrix) }}

    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    container:
      image: ${{ matrix.container }}

    steps:
      - name: Install build dependencies
        run: |
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y \
            build-essential debhelper fakeroot quilt \
            bison flex perl \
            libreadline-dev zlib1g-dev libssl-dev libpam0g-dev \
            libxml2-dev libldap2-dev uuid-dev \
            libcurl4-openssl-dev liblz4-dev libzstd-dev \
            libssh2-1-dev \
            libatomic1 \
            pkg-config libtool git ca-certificates
          apt-get install -y libatomic-dev 2>/dev/null || true
          for dir in /usr/lib/x86_64-linux-gnu /usr/lib/aarch64-linux-gnu; do
            if [ -f "$dir/libatomic.so.1" ]; then
              ln -sf libatomic.so.1 "$dir/libatomic.so"
            fi
          done
          echo "=== Testing -latomic ==="
          echo 'int main(){}' | gcc -x c - -latomic -o /dev/null 2>&1 || echo "WARNING: -latomic linking test failed"
          apt-get install -y libossp-uuid-dev 2>/dev/null || true
          apt-get install -y libcli11-dev 2>/dev/null || true
          apt-get install -y libpqxx-dev 2>/dev/null || true

      - name: Checkout packaging repo
        uses: actions/checkout@v4
        with:
          path: opentenbase-pkg

      - name: Clone OpenTenBase upstream source
        run: |
          # For v2.6.0 and v2.5.0, clone the specific tag
          VERSION="${{ matrix.version }}"
          if [ "$VERSION" = "5.0" ]; then
            git clone --depth=1 \
              https://github.com/OpenTenBase/OpenTenBase.git \
              /tmp/source/OpenTenBase
          else
            git clone --depth=1 --branch "v${VERSION}" \
              https://github.com/OpenTenBase/OpenTenBase.git \
              /tmp/source/OpenTenBase 2>/dev/null || {
              echo "Tag v${VERSION} not found, trying default branch"
              git clone --depth=1 \
                https://github.com/OpenTenBase/OpenTenBase.git \
                /tmp/source/OpenTenBase
            }
          fi

      - name: Build DEB packages
        shell: bash
        env:
          OTB_VERSION: ${{ matrix.version }}
        run: |
          cd /tmp/source/OpenTenBase
          cp -r "$GITHUB_WORKSPACE/opentenbase-pkg/debian/" ./debian/
          for f in opentenbase-ctl opentenbase.conf gtm.conf.template pg_hba.conf.template postgresql.conf.coord.template postgresql.conf.dn.template; do
            if [ -f "$GITHUB_WORKSPACE/opentenbase-pkg/config/$f" ]; then
              cp "$GITHUB_WORKSPACE/opentenbase-pkg/config/$f" ./config/
            fi
          done
          # Copy version-specific config if available
          if [ -d "$GITHUB_WORKSPACE/opentenbase-pkg/config/$OTB_VERSION" ]; then
            mkdir -p "./config/$OTB_VERSION"
            cp -r "$GITHUB_WORKSPACE/opentenbase-pkg/config/$OTB_VERSION/"* "./config/$OTB_VERSION/" 2>/dev/null || true
          fi
          if [ -d "$GITHUB_WORKSPACE/opentenbase-pkg/scripts" ]; then
            mkdir -p ./scripts
            cp -r "$GITHUB_WORKSPACE/opentenbase-pkg/scripts/"* ./scripts/ 2>/dev/null || true
          fi
          ls -la config/opentenbase-ctl 2>&1 || echo "WARNING: config/opentenbase-ctl not found"
          # Replace version in debian/rules
          if [ -n "$OTB_VERSION" ] && [ "$OTB_VERSION" != "5.0" ]; then
            sed -i "s/^OTB_VERSION := .*/OTB_VERSION := $OTB_VERSION/" debian/rules
          fi
          # Replace hardcoded 5.0 in all debian/ files for non-5.0 builds
          if [ "$OTB_VERSION" != "5.0" ]; then
            find debian/ -type f \( -name '*.install' -o -name '*.dirs' -o -name '*.postinst' -o -name '*.prerm' -o -name '*.postrm' \) \
              -exec sed -i "s/5\.0/$OTB_VERSION/g" {} +
          fi
          set -o pipefail
          fakeroot debian/rules binary 2>&1 | tee /tmp/build.log; EXIT_CODE=$?; if [ $EXIT_CODE -ne 0 ]; then echo "=== BUILD FAILED (last 300 lines) ==="; tail -300 /tmp/build.log; fi; exit $EXIT_CODE

      - name: Collect DEB packages
        if: always()
        run: |
          mkdir -p "$GITHUB_WORKSPACE/debs"
          cp /tmp/source/*.deb "$GITHUB_WORKSPACE/debs/" 2>/dev/null || true
          cd "$GITHUB_WORKSPACE/debs"
          VERSION="${{ matrix.version }}"
          for deb in *.deb; do
            [ -f "$deb" ] || continue
            # Add codename suffix to prevent collisions
            newname=$(echo "$deb" | sed "s/_${VERSION}-1ubuntu1_/_${VERSION}-1ubuntu1~${{ matrix.codename }}_/")
            if [ "$newname" != "$deb" ]; then
              mv "$deb" "$newname"
            fi
          done
          ls -la *.deb 2>/dev/null || true

      - name: Run lintian
        if: always()
        run: |
          apt-get install -y lintian 2>/dev/null || true
          if ls "$GITHUB_WORKSPACE/debs/"*.deb 1>/dev/null 2>&1; then
            lintian "$GITHUB_WORKSPACE/debs/"*.deb 2>&1 || true
          else
            echo "No .deb packages found to lint"
          fi

      - name: Upload DEB packages
        uses: actions/upload-artifact@v4
        with:
          name: debs-${{ matrix.name }}
          path: ${{ github.workspace }}/debs/*.deb
          retention-days: 30

      - name: Cleanup
        if: always()
        run: |
          rm -rf /tmp/source
          apt-get clean

  # NOTE: arm64 packages are built natively on ARM64 hardware
  # and uploaded to GitHub releases manually. QEMU emulation is unreliable
  # for compiling C/C++ projects with gcc. See scripts/build-arm64.sh
