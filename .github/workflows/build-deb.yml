name: Build DEB Packages

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'OpenTenBase version (e.g., 5.0, 6.0)'
        required: true
        default: '5.0'
        type: string
  workflow_call:
    inputs:
      version:
        description: 'OpenTenBase version (e.g., 5.0, 6.0)'
        required: false
        default: '5.0'
        type: string

jobs:
  build-deb-amd64:
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        include:
          - name: ubuntu-20.04-amd64
            container: ubuntu:20.04
            codename: focal
          - name: ubuntu-22.04-amd64
            container: ubuntu:22.04
            codename: jammy
          - name: ubuntu-24.04-amd64
            container: ubuntu:24.04
            codename: noble
          - name: ubuntu-25.04-amd64
            container: ubuntu:25.04
            codename: plucky
          - name: debian-11-amd64
            container: debian:bullseye
            codename: bullseye
          - name: debian-12-amd64
            container: debian:bookworm
            codename: bookworm
          - name: debian-13-amd64
            container: debian:trixie
            codename: trixie

    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    container:
      image: ${{ matrix.container }}

    steps:
      - name: Install build dependencies
        run: |
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y \
            build-essential debhelper fakeroot quilt \
            bison flex perl \
            libreadline-dev zlib1g-dev libssl-dev libpam0g-dev \
            libxml2-dev libldap2-dev uuid-dev \
            libcurl4-openssl-dev liblz4-dev libzstd-dev \
            libssh2-1-dev \
            libatomic1 \
            pkg-config libtool git ca-certificates
          apt-get install -y libatomic-dev 2>/dev/null || true
          for dir in /usr/lib/x86_64-linux-gnu /usr/lib/aarch64-linux-gnu; do
            if [ -f "$dir/libatomic.so.1" ]; then
              ln -sf libatomic.so.1 "$dir/libatomic.so"
            fi
          done
          echo "=== Testing -latomic ==="
          echo 'int main(){}' | gcc -x c - -latomic -o /dev/null 2>&1 || echo "WARNING: -latomic linking test failed"
          apt-get install -y libossp-uuid-dev 2>/dev/null || true
          apt-get install -y libcli11-dev 2>/dev/null || true
          apt-get install -y libpqxx-dev 2>/dev/null || true

      - name: Checkout packaging repo
        uses: actions/checkout@v4
        with:
          path: opentenbase-pkg

      - name: Clone OpenTenBase upstream source
        run: |
          git clone --depth=1 \
            https://github.com/OpenTenBase/OpenTenBase.git \
            /tmp/source/OpenTenBase

      - name: Build DEB packages
        shell: bash
        env:
          OTB_VERSION: ${{ github.event.inputs.version || '5.0' }}
        run: |
          cd /tmp/source/OpenTenBase
          cp -r "$GITHUB_WORKSPACE/opentenbase-pkg/debian/" ./debian/
          for f in opentenbase-ctl opentenbase.conf gtm.conf.template pg_hba.conf.template postgresql.conf.coord.template postgresql.conf.dn.template; do
            if [ -f "$GITHUB_WORKSPACE/opentenbase-pkg/config/$f" ]; then
              cp "$GITHUB_WORKSPACE/opentenbase-pkg/config/$f" ./config/
            fi
          done
          if [ -d "$GITHUB_WORKSPACE/opentenbase-pkg/scripts" ]; then
            mkdir -p ./scripts
            cp -r "$GITHUB_WORKSPACE/opentenbase-pkg/scripts/"* ./scripts/ 2>/dev/null || true
          fi
          ls -la config/opentenbase-ctl 2>&1 || echo "WARNING: config/opentenbase-ctl not found"
          if [ -n "$OTB_VERSION" ] && [ "$OTB_VERSION" != "5.0" ]; then
            sed -i "s/^OTB_VERSION := .*/OTB_VERSION := $OTB_VERSION/" debian/rules
          fi
          set -o pipefail
          fakeroot debian/rules binary 2>&1 | tee /tmp/build.log; EXIT_CODE=$?; if [ $EXIT_CODE -ne 0 ]; then echo "=== BUILD FAILED (last 300 lines) ==="; tail -300 /tmp/build.log; fi; exit $EXIT_CODE

      - name: Collect DEB packages
        if: always()
        run: |
          mkdir -p "$GITHUB_WORKSPACE/debs"
          cp /tmp/source/*.deb "$GITHUB_WORKSPACE/debs/" 2>/dev/null || true
          cd "$GITHUB_WORKSPACE/debs"
          for deb in *.deb; do
            [ -f "$deb" ] || continue
            newname=$(echo "$deb" | sed "s/_5.0-1ubuntu1_/_5.0-1ubuntu1~${{ matrix.codename }}_/")
            if [ "$newname" != "$deb" ]; then
              mv "$deb" "$newname"
            fi
          done
          ls -la *.deb 2>/dev/null || true

      - name: Run lintian
        if: always()
        run: |
          apt-get install -y lintian 2>/dev/null || true
          if ls "$GITHUB_WORKSPACE/debs/"*.deb 1>/dev/null 2>&1; then
            lintian "$GITHUB_WORKSPACE/debs/"*.deb 2>&1 || true
          else
            echo "No .deb packages found to lint"
          fi

      - name: Upload DEB packages
        uses: actions/upload-artifact@v4
        with:
          name: debs-${{ matrix.name }}
          path: ${{ github.workspace }}/debs/*.deb
          retention-days: 30

      - name: Cleanup
        if: always()
        run: |
          rm -rf /tmp/source
          apt-get clean

  build-deb-arm64:
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        include:
          - name: ubuntu-22.04-arm64
            container: arm64v8/ubuntu:22.04
            codename: jammy
          - name: ubuntu-24.04-arm64
            container: arm64v8/ubuntu:24.04
            codename: noble
          - name: debian-12-arm64
            container: arm64v8/debian:bookworm
            codename: bookworm

    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Set up QEMU for arm64
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user-static binfmt-support
          docker run --rm --privileged multiarch/qemu-user-static --reset -p yes

      - name: Checkout packaging repo
        uses: actions/checkout@v4
        with:
          path: opentenbase-pkg

      - name: Clone OpenTenBase upstream source
        run: |
          git clone --depth=1 \
            https://github.com/OpenTenBase/OpenTenBase.git \
            /tmp/source/OpenTenBase

      - name: Build DEB packages (arm64 via QEMU)
        env:
          OTB_VERSION: ${{ github.event.inputs.version || '5.0' }}
        run: |
          docker run --rm --platform linux/arm64 \
            -v /tmp/source/OpenTenBase:/tmp/source:ro \
            -v ${{ github.workspace }}/opentenbase-pkg:/tmp/pkg:ro \
            -v ${{ github.workspace }}/output:/output \
            -e OTB_VERSION="$OTB_VERSION" \
            ${{ matrix.container }} \
            bash -c '
              set -e
              export DEBIAN_FRONTEND=noninteractive
              apt-get update
              apt-get install -y \
                build-essential debhelper fakeroot quilt \
                bison flex perl \
                libreadline-dev zlib1g-dev libssl-dev libpam0g-dev \
                libxml2-dev libldap2-dev uuid-dev \
                libcurl4-openssl-dev liblz4-dev libzstd-dev \
                libssh2-1-dev \
                libatomic1 libatomic-dev \
                pkg-config libtool git ca-certificates || {
                echo "Some packages may not be available, trying without optional ones"
                apt-get install -y \
                  build-essential debhelper fakeroot quilt \
                  bison flex perl \
                  libreadline-dev zlib1g-dev libssl-dev libpam0g-dev \
                  libxml2-dev libldap2-dev uuid-dev \
                  libcurl4-openssl-dev liblz4-dev \
                  libatomic1 \
                  pkg-config libtool git ca-certificates
              }
              for dir in /usr/lib/aarch64-linux-gnu; do
                if [ -f "$dir/libatomic.so.1" ] && [ ! -f "$dir/libatomic.so" ]; then
                  ln -sf libatomic.so.1 "$dir/libatomic.so"
                fi
              done

              cp -r /tmp/source /tmp/build
              cd /tmp/build
              cp -r /tmp/pkg/debian/ ./debian/
              for f in opentenbase-ctl opentenbase.conf gtm.conf.template pg_hba.conf.template postgresql.conf.coord.template postgresql.conf.dn.template; do
                if [ -f "/tmp/pkg/config/$f" ]; then
                  cp "/tmp/pkg/config/$f" ./config/
                fi
              done
              if [ -d "/tmp/pkg/scripts" ]; then
                mkdir -p ./scripts
                cp -r /tmp/pkg/scripts/* ./scripts/ 2>/dev/null || true
              fi
              if [ -n "$OTB_VERSION" ] && [ "$OTB_VERSION" != "5.0" ]; then
                sed -i "s/^OTB_VERSION := .*/OTB_VERSION := $OTB_VERSION/" debian/rules
              fi
              set -o pipefail
              fakeroot debian/rules binary 2>&1 | tee /tmp/build.log
              cp /tmp/build/*.deb /output/ 2>/dev/null || true
            '

      - name: Collect DEB packages
        if: always()
        run: |
          mkdir -p "$GITHUB_WORKSPACE/debs"
          cp ${{ github.workspace }}/output/*.deb "$GITHUB_WORKSPACE/debs/" 2>/dev/null || true
          cd "$GITHUB_WORKSPACE/debs"
          for deb in *.deb; do
            [ -f "$deb" ] || continue
            newname=$(echo "$deb" | sed "s/_5.0-1ubuntu1_/_5.0-1ubuntu1~${{ matrix.codename }}_/")
            if [ "$newname" != "$deb" ]; then
              mv "$deb" "$newname"
            fi
          done
          ls -la *.deb 2>/dev/null || true

      - name: Upload DEB packages
        uses: actions/upload-artifact@v4
        with:
          name: debs-${{ matrix.name }}
          path: ${{ github.workspace }}/debs/*.deb
          retention-days: 30
