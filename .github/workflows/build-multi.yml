name: Build Multi-Distro Packages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: ubuntu
            version: "20.04"
            codename: focal
            dockerfile: docker-ubuntu-20.04.Dockerfile
          - distro: ubuntu
            version: "22.04"
            codename: jammy
            dockerfile: docker-ubuntu-20.04.Dockerfile
          - distro: ubuntu
            version: "24.04"
            codename: noble
            dockerfile: docker-ubuntu-20.04.Dockerfile
          - distro: debian
            version: "11"
            codename: bullseye
            dockerfile: docker-debian-11.Dockerfile
          - distro: debian
            version: "12"
            codename: bookworm
            dockerfile: docker-debian-12.Dockerfile

    steps:
      - name: Checkout packaging repo
        uses: actions/checkout@v4
        with:
          path: packaging

      - name: Checkout OpenTenBase source
        uses: actions/checkout@v4
        with:
          repository: OpenTenBase/OpenTenBase
          path: source
          fetch-depth: 1

      - name: Merge packaging into source
        run: |
          mkdir -p source/debian
          for f in packaging/*; do
            name=$(basename "$f")
            case "$name" in
              .github|README.md|VERIFICATION.md|ROADMAP.md|ROADMAP_zh.md|CONTRIBUTING.md|CONTRIBUTING_zh.md|docker-*.Dockerfile|build-deb.sh) continue ;;
            esac
            cp -a "$f" source/debian/
          done

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build \
            --file packaging/${{ matrix.dockerfile }} \
            --tag opentenbase-builder:${{ matrix.distro }}-${{ matrix.version }} \
            .

      - name: Build packages
        run: |
          docker run \
            --volume $(pwd)/source:/source \
            --volume $(pwd)/output:/output \
            opentenbase-builder:${{ matrix.distro }}-${{ matrix.version }}

      - name: Verify packages
        run: |
          for deb in output/*.deb; do
            echo "=== $(basename $deb) ==="
            dpkg-deb -I "$deb" | head -15
            echo
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: debs-${{ matrix.distro }}-${{ matrix.codename }}
          path: output/*.deb
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-debs

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            all-debs/**/*.deb
            install.sh
