name: Build Multi-Distro Packages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      distro:
        description: 'Build specific distro (leave empty for all)'
        required: false
        type: choice
        options:
          - ''
          - ubuntu-20.04
          - ubuntu-22.04
          - ubuntu-24.04
          - debian-11
          - debian-12

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: ubuntu
            version: "20.04"
            codename: focal
            dockerfile: docker/build/docker-ubuntu-20.04.Dockerfile
          - distro: ubuntu
            version: "22.04"
            codename: jammy
            dockerfile: docker/build/docker-ubuntu-22.04.Dockerfile
          - distro: ubuntu
            version: "24.04"
            codename: noble
            dockerfile: docker/build/docker-ubuntu-24.04.Dockerfile
          - distro: debian
            version: "11"
            codename: bullseye
            dockerfile: docker/build/docker-debian-11.Dockerfile
          - distro: debian
            version: "12"
            codename: bookworm
            dockerfile: docker/build/docker-debian-12.Dockerfile

    steps:
      - name: Check if should build
        id: check
        run: |
          INPUT_DISTRO="${{ github.event.inputs.distro }}"
          MATRIX_KEY="${{ matrix.distro }}-${{ matrix.version }}"
          if [ -z "$INPUT_DISTRO" ] || [ "$INPUT_DISTRO" = "$MATRIX_KEY" ]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
          else
            echo "should_build=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout packaging repo
        if: steps.check.outputs.should_build == 'true'
        uses: actions/checkout@v4
        with:
          path: packaging

      - name: Checkout OpenTenBase source
        if: steps.check.outputs.should_build == 'true'
        uses: actions/checkout@v4
        with:
          repository: OpenTenBase/OpenTenBase
          path: source
          fetch-depth: 1

      - name: Merge packaging into source
        if: steps.check.outputs.should_build == 'true'
        run: |
          mkdir -p source/debian
          cp -a packaging/debian/* source/debian/
          cp -a packaging/config source/
          cp -a packaging/patches source/debian/

      - name: Set up Docker Buildx
        if: steps.check.outputs.should_build == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        if: steps.check.outputs.should_build == 'true'
        run: |
          docker build \
            --file packaging/${{ matrix.dockerfile }} \
            --tag opentenbase-builder:${{ matrix.distro }}-${{ matrix.version }} \
            .

      - name: Build packages
        if: steps.check.outputs.should_build == 'true'
        run: |
          docker run \
            --volume $(pwd)/source:/source \
            --volume $(pwd)/output:/output \
            opentenbase-builder:${{ matrix.distro }}-${{ matrix.version }}

      - name: Verify packages
        if: steps.check.outputs.should_build == 'true'
        run: |
          for deb in output/*.deb; do
            echo "=== $(basename $deb) ==="
            dpkg-deb -I "$deb" | head -15
            echo
          done

      - name: Rename packages with codename
        if: steps.check.outputs.should_build == 'true'
        run: |
          sudo chown -R $(id -u):$(id -g) output/
          cd output
          for deb in *.deb; do
            newname=$(echo "$deb" | sed "s/_5.0-1ubuntu1_/_5.0-1ubuntu1~${{ matrix.codename }}_/")
            if [ "$newname" != "$deb" ]; then
              mv "$deb" "$newname"
              echo "Renamed: $deb -> $newname"
            fi
          done
          ls -la *.deb

      - name: Upload artifacts
        if: steps.check.outputs.should_build == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: debs-${{ matrix.distro }}-${{ matrix.codename }}
          path: output/*.deb
          retention-days: 30

  # Test each distro after build
  test:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: ubuntu
            version: "20.04"
            codename: focal
          - distro: ubuntu
            version: "22.04"
            codename: jammy
          - distro: ubuntu
            version: "24.04"
            codename: noble
          - distro: debian
            version: "11"
            codename: bullseye
          - distro: debian
            version: "12"
            codename: bookworm

    steps:
      - name: Check if should test
        id: check
        run: |
          INPUT_DISTRO="${{ github.event.inputs.distro }}"
          MATRIX_KEY="${{ matrix.distro }}-${{ matrix.version }}"
          if [ -z "$INPUT_DISTRO" ] || [ "$INPUT_DISTRO" = "$MATRIX_KEY" ]; then
            echo "should_test=true" >> $GITHUB_OUTPUT
          else
            echo "should_test=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout repo
        if: steps.check.outputs.should_test == 'true'
        uses: actions/checkout@v4

      - name: Download packages
        if: steps.check.outputs.should_test == 'true'
        uses: actions/download-artifact@v4
        with:
          name: debs-${{ matrix.distro }}-${{ matrix.codename }}
          path: packages/

      - name: Run smoke test in Docker
        if: steps.check.outputs.should_test == 'true'
        run: |
          cat > Dockerfile.test << EOF
          FROM ${{ matrix.distro }}:${{ matrix.version }}
          ENV DEBIAN_FRONTEND=noninteractive

          RUN apt-get update && apt-get install -y \
              sudo procps \
              && rm -rf /var/lib/apt/lists/*

          COPY packages/*.deb /tmp/debs/
          RUN dpkg --force-depends -i /tmp/debs/*.deb
          RUN mkdir -p /usr/lib/opentenbase/lib/postgresql
          RUN ldconfig || true

          COPY test/smoke-test.sh /test/
          RUN chmod +x /test/smoke-test.sh

          CMD ["/test/smoke-test.sh"]
          EOF

          docker build -f Dockerfile.test -t opentenbase-test:${{ matrix.codename }} .
          docker run --rm --cap-add SYS_PTRACE opentenbase-test:${{ matrix.codename }}

  release:
    needs: [build, test]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-debs

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            all-debs/**/*.deb
            scripts/install.sh
